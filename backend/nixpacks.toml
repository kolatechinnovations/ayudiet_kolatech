[phases.setup]
aptPkgs = ["libgl1", "libgl1-mesa-glx", "libglib2.0-0", "libsm6", "libxext6", "libxrender1", "libxcb1", "libx11-6", "libxcb-shm0", "libxcb-shape0", "libxcb-xfixes0", "libxcb-present0", "libxcb-icccm4", "libxcb-image0", "libxcb-keysyms1", "libxcb-randr0", "libxcb-render-util0", "libxcb-render0", "libxcb-sync1", "libxcb-util1", "libxcb-xinerama0", "libxcb-xkb1", "libx11-xcb1", "libdbus-1-3", "libxi6"]

[phases.install]
cmds = ["python -m pip install -r requirements.txt", "python -m pip uninstall -y opencv-contrib-python opencv-python"]

[start]
cmd = "gunicorn --bind 0.0.0.0:8080 app:app"
